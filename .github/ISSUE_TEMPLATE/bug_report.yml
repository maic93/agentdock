name: Bug report
description: Report a problem with an existing part of AgentDock.
title: "fix: <short description>"
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps someone else could follow to see the same problem.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: package
    attributes:
      label: Affected package(s)
      description: e.g. packages/kernel/planner, apps/api
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Windows (WSL2)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
