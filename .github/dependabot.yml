# Dependabot, not Renovate — see docs/architecture (or the note below) for
# why. Kept deliberately simple: weekly batched PRs, grouped by ecosystem, to
# avoid drowning maintainers in individual bump PRs at scale.
version: 2

updates:
  # Security fixes only for npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"

  # Security fixes only for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  # Security fixes only for Docker
  - package-ecosystem: "docker"
    directory: "/infra/docker"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "infra"
